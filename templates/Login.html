<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grinch Bot — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:      #2d6a2d;
      --green-light:#4a9e4a;
      --bg:         #0d1f0d;
      --card:       #1a2e1a;
      --border:     #2d4a2d;
      --text:       #e8f5e8;
      --muted:      #7fb87f;
      --red:        #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 40px rgba(45,106,45,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo .icon { font-size: 3rem; }
    .logo h1 {
      font-family: 'Mountains of Christmas', cursive;
      font-size: 2rem;
      color: var(--green-light);
      margin-top: 6px;
    }
    .logo p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0d1f0d;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green-light); }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: var(--green);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: var(--green-light); }
    .btn:active { transform: scale(0.98); }

    .error {
      background: rgba(192,57,43,0.15);
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #e74c3c;
      margin-top: 16px;
    }

    .switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .switch a {
      color: var(--green-light);
      text-decoration: none;
      font-weight: 700;
    }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">🎄</div>
      <h1>Grinch Bot</h1>
      <p>Sign in to chat with the Grinch</p>
    </div>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="your username" autocomplete="username" required/>

      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>

      <button class="btn" type="submit">Sign In 🎄</button>
    </form>

    <div class="switch">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>
</body>
</html>
